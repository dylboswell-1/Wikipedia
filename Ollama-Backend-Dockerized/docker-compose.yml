version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    # Use GPU if available (requires nvidia-docker)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ollama-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_TIMEOUT=300
      - ENVIRONMENT=development
    depends_on:
      - ollama
    volumes:
      - ./src:/app
    command: >
      python -m uvicorn main:app 
      --host 0.0.0.0 
      --port 8000 
      --reload
    networks:
      - ollama-network

networks:
  ollama-network:
    driver: bridge

volumes:
  ollama-data:
    driver: local
