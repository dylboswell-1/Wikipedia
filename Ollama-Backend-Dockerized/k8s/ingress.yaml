apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ollama-backend-ingress
  namespace: ollama-backend
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - ollama-api.example.com
    secretName: ollama-backend-tls
  rules:
  - host: ollama-api.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ollama-backend
            port:
              number: 80
